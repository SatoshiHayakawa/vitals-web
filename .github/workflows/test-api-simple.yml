name: Test API Simple

on:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Check if API key exists
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ANTHROPIC_API_KEY is NOT set"
            exit 1
          else
            echo "✅ ANTHROPIC_API_KEY is set"
          fi
      
      - name: Test API key format
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Checking API key format..."
          if [[ "$API_KEY" == sk-ant-* ]]; then
            echo "✅ API key format is correct (sk-ant-...)"
            echo "Key length: ${#API_KEY} characters"
          else
            echo "❌ API key format is incorrect"
            echo "Expected format: sk-ant-api03-..."
            exit 1
          fi
      
      - name: Test Anthropic API directly
        run: |
          echo "Testing Anthropic API..."
          
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST https://api.anthropic.com/v1/messages \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{
              "model": "claude-3-haiku-20240307",
              "max_tokens": 50,
              "messages": [{"role": "user", "content": "Say hello in one word"}]
            }')
          
          # HTTPステータスコードを抽出
          HTTP_STATUS=$(echo "$RESPONSE" | grep -o "HTTP_STATUS:[0-9]*" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body: $BODY"
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ API key is valid and working!"
          else
            echo "❌ API call failed with status $HTTP_STATUS"
            exit 1
          fi
