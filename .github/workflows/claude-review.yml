auto-review:
    name: Automatic PR Review
    runs-on: ubuntu-latest
    env:  # envはここに配置
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          separator: ","

      - name: Auto Review by Claude
        uses: anthropics/claude-code-action@beta
        with:
          mode: agent  # エージェントモード（自動実行）
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          override_prompt: |
            このプルリクエストをレビューしてください。
            
            変更されたファイル: ${{ steps.changed-files.outputs.all_changed_files }}
            
            以下の観点で確認してください：
            1. Next.js 15のベストプラクティス
            2. TypeScriptの型安全性
            3. パフォーマンスの最適化
            4. セキュリティの問題
            5. Vitalsプロジェクトの要件との整合性
            
            問題がある場合は具体的な改善案を提示してください。
